<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' file:; img-src 'self' data: blob: file: https:; style-src 'self' 'unsafe-inline' file:; script-src 'self' 'unsafe-inline' file:; font-src 'self' data: file:; connect-src 'self' file:;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MarkdownReader</title>
  <link rel="stylesheet" href="katex.css" />
  <link rel="stylesheet" href="styles.css" />
  <script src="mermaid.min.js" defer></script>
</head>
<body>
  <div class="titlebar">
    <div class="titlebar-left">
      <img class="app-icon" src="logo.png" alt="logo" />
      <span class="title-text" id="titleText">MarkdownReader</span>
    </div>
    <div class="titlebar-drag"></div>
    <div class="titlebar-right" id="windowControls"></div>
  </div>

  <div class="toolbar">
    <div class="tool-group">
      <button class="btn icon-btn" id="btnOpen" title="打开文件 (Ctrl+O)" aria-label="打开文件">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M4 4h6l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/></svg>
      </button>
      <button class="btn icon-btn" id="btnRecent" title="最近文件" aria-label="最近文件">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6a7 7 0 1 1 2.05 4.95l-1.42 1.42A9 9 0 1 0 13 3zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
      </button>
    </div>
    <div class="tool-group">
      <button class="btn icon-btn" id="btnBack" title="后退" aria-label="后退">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <button class="btn icon-btn" id="btnForward" title="前进" aria-label="前进">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M4 11h12.17l-5.59-5.59L12 4l8 8-8 8-1.41-1.41L16.17 13H4z"/></svg>
      </button>
    </div>
    <div class="tool-group">
      <button class="btn icon-btn" id="btnToc" title="目录 (Ctrl+Shift+C)" aria-label="目录" aria-pressed="true">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M3 9h14V7H3v2zm0 4h14v-2H3v2zm0 4h14v-2H3v2zm16 0h2v-2h-2v2zm0-10v2h2V7h-2zm0 6h2v-2h-2v2z"/></svg>
      </button>
    </div>
    <div class="tool-group">
      <button class="btn icon-btn" id="btnFind" title="查找 (Ctrl+F)" aria-label="查找">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
      </button>
    </div>
    <div class="tool-spacer"></div>
    <div class="tool-group">
      <button class="btn icon-btn" id="btnZoomOut" title="缩小 (Ctrl+-)" aria-label="缩小">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M19 13H5v-2h14v2z"/></svg>
      </button>
      <button class="btn zoom-display" id="btnZoomReset" title="重置缩放 (Ctrl+0)">100%</button>
      <button class="btn icon-btn" id="btnZoomIn" title="放大 (Ctrl+=)" aria-label="放大">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      </button>
    </div>
    <div class="tool-group">
      <button class="btn icon-btn" id="btnExport" title="导出为 PDF" aria-label="导出 PDF">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
      </button>
      <button class="btn icon-btn" id="btnPrint" title="打印" aria-label="打印">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M19 8H5a3 3 0 0 0-3 3v6h4v4h12v-4h4v-6a3 3 0 0 0-3-3zm-3 11H8v-5h8v5zm3-7a1 1 0 1 1 1-1 1 1 0 0 1-1 1zM18 3H6v4h12z"/></svg>
      </button>
    </div>
    <div class="tool-group">
     <button class="btn icon-btn" id="btnTheme" title="切换主题 (Ctrl+Shift+T)" aria-label="切换主题">
       <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 7a5 5 0 1 0 5 5 5 5 0 0 0-5-5zm0-5a1 1 0 0 0-1 1v2a1 1 0 0 0 2 0V3a1 1 0 0 0-1-1zm0 17a1 1 0 0 0-1 1v2a1 1 0 0 0 2 0v-2a1 1 0 0 0-1-1zm9-9h-2a1 1 0 0 0 0 2h2a1 1 0 0 0 0-2zM5 12a1 1 0 0 0-1-1H2a1 1 0 0 0 0 2h2a1 1 0 0 0 1-1zm14.07 6.07a1 1 0 0 0-1.41 1.41l1.41 1.41a1 1 0 0 0 1.41-1.41l-1.41-1.41zM4.93 4.93a1 1 0 0 0-1.41 0 1 1 0 0 0 0 1.41l1.41 1.41A1 1 0 1 0 6.34 6.34L4.93 4.93zm14.14 0l-1.41 1.41a1 1 0 0 0 1.41 1.41l1.41-1.41a1 1 0 0 0 0-1.41 1 1 0 0 0-1.41 0zM6.34 17.66l-1.41 1.41a1 1 0 0 0 1.41 1.41l1.41-1.41a1 1 0 0 0-1.41-1.41z"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.39 5.39 0 0 1-4.4 2.26 5.4 5.4 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
     </button>
    </div>
  </div>

 <div class="main">
   <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span>目录</span>
        <span class="toc-count" id="tocCount"></span>
      </div>
      <div class="sidebar-search" id="sidebarSearch">
        <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
        <input type="text" id="tocFilter" placeholder="筛选标题…" spellcheck="false" />
      </div>
     <nav class="toc" id="toc"></nav>
      <div class="sidebar-footer" id="sidebarFooter"></div>
   </aside>
   <div class="resizer" id="resizer"></div>
   <main class="content-wrap">
      <div class="reading-progress" id="readingProgress"><div class="reading-progress-bar"></div></div>
     <article class="markdown-body" id="content"></article>
      <div class="welcome" id="welcome">
        <div class="welcome-card">
          <img class="welcome-logo" src="logo.png" alt="logo" />
          <h1>MarkdownReader</h1>
          <p class="welcome-sub">一个美观的 Markdown 阅读器</p>
          <div class="welcome-actions">
            <button class="btn primary" id="welcomeOpen">打开 Markdown 文件</button>
            <span class="welcome-hint">或拖放文件到窗口 · 支持 .md .markdown .mdown .mkd</span>
          </div>
          <div class="welcome-features">
            <div class="feature"><span class="dot"></span>GitHub 风格 Markdown</div>
            <div class="feature"><span class="dot"></span>代码语法高亮</div>
            <div class="feature"><span class="dot"></span>数学公式 KaTeX</div>
            <div class="feature"><span class="dot"></span>Mermaid 图表</div>
            <div class="feature"><span class="dot"></span>目录导航</div>
            <div class="feature"><span class="dot"></span>明暗主题</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="findbar" id="findbar">
    <input type="text" id="findInput" placeholder="查找…" spellcheck="false" />
    <span class="find-count" id="findCount"></span>
    <button class="btn icon-btn" id="findPrev" title="上一个" aria-label="上一个">
      <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M4 11h12.17l-5.59-5.59L12 4l8 8-8 8-1.41-1.41L16.17 13H4z"/></svg>
    </button>
    <button class="btn icon-btn" id="findNext" title="下一个" aria-label="下一个">
      <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M4 11h12.17l-5.59-5.59L12 4l8 8-8 8-1.41-1.41L16.17 13H4z" transform="rotate(180 12 12)"/></svg>
    </button>
    <button class="btn icon-btn" id="findClose" title="关闭" aria-label="关闭">
      <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>
  </div>

 <div class="dropdown" id="recentDropdown"></div>
  <footer class="statusbar" id="statusbar">
    <span class="status-item" id="statusFile"></span>
    <span class="status-spacer"></span>
    <span class="status-item" id="statusWords"></span>
    <span class="status-sep"></span>
    <span class="status-item" id="statusReading"></span>
    <span class="status-sep"></span>
    <span class="status-item" id="statusLineCol"></span>
    <span class="status-spacer"></span>
    <span class="status-item status-copy">© 智讯数科</span>
    <span class="status-sep"></span>
    <span class="status-item status-ver" id="statusVer">v1.0.0</span>
  </footer>

  <script>
    window.addEventListener('load', () => {
      if (window.mermaid) {
        try { window.mermaid.initialize({ startOnLoad: false, securityLevel: 'loose', theme: 'neutral' }); } catch (e) {}
      }
    });
  </script>
  <script src="../dist/renderer.bundle.js"></script>
</body>
</html>
